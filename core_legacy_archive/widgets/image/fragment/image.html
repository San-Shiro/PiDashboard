<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #widget-root {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      display: block;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="widget-root">
    <img id="image-display" src="" alt="" style="display: none;" />
  </div>

  <script>
    let config = {
      imageUrl: "",
      objectFit: "cover",
      widthPercent: 100,
      lockAspectRatio: true
    };

    window.addEventListener("message", (e) => {
      if (e.data.type === "config_hydrate") {
        config = { ...config, ...e.data.config };
        applyConfig();
      }
    });

    function applyConfig() {
      const img = document.getElementById("image-display");
      
      if (!config.imageUrl || config.imageUrl.trim() === "") {
        img.style.display = "none";
        return;
      }
      
      img.src = config.imageUrl;
      img.style.display = "block";
      
      img.style.objectFit = config.objectFit;
      img.style.width = `${Math.max(10, Math.min(100, config.widthPercent))}%`;
      
      if (config.lockAspectRatio) {
        img.style.height = "auto";
      } else {
        img.style.height = "100%";
      }
    }

    applyConfig();
  </script>
</body>
</html>
