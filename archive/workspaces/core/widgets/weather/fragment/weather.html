<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    #widget-root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      box-sizing: border-box;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-container svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
    }

    .temp-container {
      display: flex;
      flex-direction: column;
    }

    .temp {
      font-size: 4.5rem;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -2px;
    }

    .location {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 0.5rem;
      opacity: 0.9;
      text-align: center;
    }

    .details {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 1rem;
      opacity: 0.8;
      font-weight: 400;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
  </style>
</head>
<body>
  <div id="widget-root">
    <div class="weather-main">
      <div class="icon-container" id="icon">
        <!-- SVG injected here -->
      </div>
      <div class="temp-container">
        <div class="temp" id="temp">--°</div>
      </div>
    </div>
    <div class="location" id="location">Loading...</div>
    <div class="details">
      <div class="detail-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span id="wind">--</span>
      </div>
      <div class="detail-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
        <span id="humidity">--%</span>
      </div>
      <div class="detail-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M18 13l-6 6-6-6"/></svg>
        <span id="minmax">--° / --°</span>
      </div>
    </div>
  </div>

  <script>
    // Minimal beautiful SVGs for weather conditions
    const icons = {
      sun: `<svg viewBox="0 0 64 64" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="12" fill="#FFD700" fill-opacity="0.2"/><path d="M32 8v4M32 52v4M8 32h4M52 32h4M15 15l2.8 2.8M46.2 46.2l2.8 2.8M15 49l2.8-2.8M46.2 17.8l2.8-2.8"/></svg>`,
      cloud: `<svg viewBox="0 0 64 64" fill="none" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 38a12 12 0 0 1 0-24 12.2 12.2 0 0 1 5.4 1.3 16 16 0 0 1 29.2 8.7 10 10 0 0 1 1.4 19z" fill="#E2E8F0" fill-opacity="0.2"/></svg>`,
      rain: `<svg viewBox="0 0 64 64" fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 36a10 10 0 0 1 0-20 10.2 10.2 0 0 1 4.5 1.1 14 14 0 0 1 25.5 7.9 8 8 0 0 1 1 15z" stroke="#E2E8F0"/><path d="M24 44l-4 12M32 44l-4 12M40 44l-4 12" stroke="#60A5FA"/></svg>`,
      snow: `<svg viewBox="0 0 64 64" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M32 12v40M12 32h40M18 18l28 28M18 46l28-28M24 24l-4-4M40 24l4-4M24 40l-4 4M40 40l4 4"/></svg>`,
      storm: `<svg viewBox="0 0 64 64" fill="none" stroke="#FCD34D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 34a10 10 0 0 1 0-20 10.2 10.2 0 0 1 4.5 1.1 14 14 0 0 1 25.5 7.9 8 8 0 0 1 1 15z" stroke="#64748B"/><path d="M34 32l-10 14h12l-6 14" fill="#FBBF24"/></svg>`
    };

    function getWeatherIcon(code) {
      if (code === 0 || code === 1) return icons.sun;
      if (code === 2 || code === 3 || code === 45 || code === 48) return icons.cloud;
      if (code >= 51 && code <= 67) return icons.rain;
      if (code >= 71 && code <= 86) return icons.snow;
      if (code >= 95 && code <= 99) return icons.storm;
      return icons.sun; // fallback
    }

    window.addEventListener("message", (e) => {
      if (e.data.type === "data") {
        const d = e.data.data;
        document.getElementById("temp").textContent = `${d.temp}°`;
        document.getElementById("location").textContent = d.location;
        document.getElementById("minmax").textContent = `${d.tempMin}° / ${d.tempMax}°`;
        document.getElementById("humidity").textContent = `${d.humidity}%`;
        
        const speedUnit = d.units === "imperial" ? "mph" : "km/h";
        document.getElementById("wind").textContent = `${d.windSpeed} ${speedUnit}`;

        document.getElementById("icon").innerHTML = getWeatherIcon(d.weather_code);
      }
    });
  </script>
</body>
</html>
