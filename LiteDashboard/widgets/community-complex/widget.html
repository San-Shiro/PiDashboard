<style>
  .complex-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px;
    box-sizing: border-box;
    font-family: var(--widget-font, sans-serif);
    color: var(--widget-text-color, #fff);
  }
  .header {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .time-display {
    font-size: 12px;
    opacity: 0.7;
    font-family: monospace;
    transition: opacity 0.5s ease-in-out, text-shadow 0.5s ease;
  }
  .time-display.tick {
    opacity: 1;
    text-shadow: 0 0 8px var(--widget-accent-color);
  }
  .chart-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 4px;
    min-height: 50px;
    position: relative;
  }
  .bar {
    flex: 1;
    background: var(--widget-accent-color, #ff0055);
    border-radius: 2px 2px 0 0;
    transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.4s ease, box-shadow 0.4s ease;
    min-height: 2px;
    box-shadow: 0 0 2px var(--widget-accent-color);
  }
  .bar.high {
    background: #ff3366 !important;
    box-shadow: 0 0 10px #ff3366;
  }
  .bar.medium {
    background: #ffcc00 !important;
    box-shadow: 0 0 8px #ffcc00;
  }
  .notepad-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    height: 80px;
  }
  .notepad {
    flex: 1;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: inherit;
    padding: 6px;
    font-size: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .notepad:focus {
    border-color: var(--widget-accent-color, #ff0055);
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
  }
  .btn-row {
    display: flex;
    justify-content: flex-end;
  }
  .btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: inherit;
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 11px;
    transition: background 0.2s ease, transform 0.1s ease;
  }
  .btn:hover {
    background: rgba(255,255,255,0.2);
  }
  .btn:active {
    transform: scale(0.95);
  }
</style>

<div class="complex-root" id="complex-root">
  <div class="header">
    <span class="title">Network Load</span>
    <span class="time-display" id="time-display" data-bind="time">--:--:--</span>
  </div>
  
  <div class="chart-container" id="chart">
    <!-- Bars generated by JS -->
  </div>
  
  <div class="notepad-container">
    <textarea class="notepad" id="notepad-input" placeholder="Quick note..."></textarea>
    <div class="btn-row">
      <button class="btn" id="btn-save">Save Note</button>
      <button class="btn" id="btn-clear" style="margin-left: 6px;">Clear</button>
    </div>
  </div>
</div>

<script>
  var _get = typeof $ !== 'undefined' ? $ : function(sel) { return document.querySelector(sel); };
  var complexRoot = _get('#complex-root');
  var chart = _get('#chart');
  var notepadInput = _get('#notepad-input');
  var btnSave = _get('#btn-save');
  var btnClear = _get('#btn-clear');
  var timeDisplay = _get('#time-display');
  
  var cfg = (typeof widget !== 'undefined' && widget.config) || (window.PiWidget && window.PiWidget.config) || {};
  
  // Theme and Colors
  var textColor = PiTheme.getColor(cfg, cfg.textColor, "--canvas-text", "#e0e0e0");
  var bg = PiTheme.getBackground(cfg, cfg.background, "var(--canvas-surface)", "var(--canvas-surface)");
  var accentColor = PiTheme.getColor(cfg, null, "--canvas-accent", "#6366f1");
  
  complexRoot.style.color = textColor;
  complexRoot.style.background = bg;
  complexRoot.style.setProperty('--widget-accent-color', accentColor);
  complexRoot.style.setProperty('--widget-text-color', textColor);

  // Initialize Bars
  var bars = [];
  for (var i = 0; i < 15; i++) {
    var bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = '2px';
    chart.appendChild(bar);
    bars.push(bar);
  }

  // Handle incoming data from Daemon
  function onData(data) {
    if (data && data.loadMetrics !== undefined) {
      // Shift bars left and push new metric
      for (var i = 0; i < bars.length - 1; i++) {
        bars[i].style.height = bars[i+1].style.height;
        bars[i].className = bars[i+1].className;
      }
      
      // Calculate height (load is usually 0.0 - 4.0 on pi zero, multiply by 20 to get percentage)
      var loadVal = parseFloat(data.loadMetrics);
      var heightPct = Math.min(100, Math.max(2, loadVal * 25));
      var lastBar = bars[bars.length - 1];
      lastBar.style.height = heightPct + '%';
      
      if (loadVal > 2.0) lastBar.className = 'bar high';
      else if (loadVal > 1.0) lastBar.className = 'bar medium';
      else lastBar.className = 'bar';
    }
    
    // Time tick animation
    if (data && data.time) {
      timeDisplay.classList.add('tick');
      setTimeout(function() { timeDisplay.classList.remove('tick'); }, 500);
    }
  }

  // Handle incoming persistent state
  function onState(state) {
    if (state && state.note !== undefined && document.activeElement !== notepadInput) {
      notepadInput.value = state.note;
    }
  }

  // Button actions (persist state)
  btnSave.addEventListener('click', function() {
    if (typeof widget !== 'undefined' && widget.patchState) {
      widget.patchState({ note: notepadInput.value });
    }
    btnSave.textContent = 'Saved!';
    setTimeout(function() { btnSave.textContent = 'Save Note'; }, 1500);
  });

  btnClear.addEventListener('click', function() {
    clearTimeout(noteTimeout);
    notepadInput.value = '';
    if (typeof widget !== 'undefined' && widget.patchState) {
      widget.patchState({ note: '' });
    }
  });

  // Auto-save typing with debounce
  var noteTimeout;
  notepadInput.addEventListener('input', function() {
    clearTimeout(noteTimeout);
    noteTimeout = setTimeout(function() {
      if (typeof widget !== 'undefined' && widget.patchState) {
        widget.patchState({ note: notepadInput.value });
      }
    }, 1000);
  });
  // Register callbacks with PiDashboard engine
  if (typeof widget !== 'undefined' && widget.register) {
    widget.register({
      onData: onData,
      onState: onState
    });
  }
</script>
