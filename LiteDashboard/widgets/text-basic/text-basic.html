<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  
  .text-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-sizing: border-box;
    
    /* Allow wrapping and formatting */
    word-break: break-word;
    white-space: pre-wrap;
  }
</style>

<div class="text-container" 
     id="text-block"
     data-bind-style="font-family:{{fontFamily}}; font-size:{{fontSize}}px; font-weight:{{fontWeight}}; font-style:{{fontStyle}}; color:{{textColor}}; text-align:{{alignment}}; letter-spacing:{{letterSpacing}}px;"
     data-bind="textContent">Your Text Here</div>
