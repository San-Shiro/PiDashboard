<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
  }
  .player-card {
    background: linear-gradient(135deg, rgba(20,20,30,0.9), rgba(10,10,15,0.95));
    border-radius: 16px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 24px;
    box-sizing: border-box;
    color: white;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(100, 150, 255, 0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .main-content {
    display: flex;
    flex: 1;
    z-index: 1;
    gap: 32px;
  }

  .album-art {
    width: 200px;
    height: 200px;
    border-radius: 12px;
    background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .album-art::after {
    content: '♪';
    font-size: 80px;
    color: rgba(255,255,255,0.3);
  }

  .track-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .artist {
    font-size: 24px;
    color: #a0a0b0;
    margin-bottom: 24px;
  }
  
  .lyrics {
    font-size: 20px;
    font-style: italic;
    color: #ffd700;
    height: 60px;
    display: flex;
    align-items: center;
    opacity: 0.8;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: auto;
  }

  .btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    width: 64px;
    height: 64px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
  }

  .btn:active {
    transform: scale(0.95);
  }

  .btn svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
  }
  
  .btn.play-pause {
    background: #4ECDC4;
    color: #000;
    width: 80px;
    height: 80px;
  }

  .btn.play-pause:hover {
    background: #45b8b0;
  }

  .progress-container {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-top: 24px;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4ECDC4, #556270);
    width: 0%;
    transition: width 0.5s linear;
    border-radius: 4px;
  }
  
  /* SVG Icons */
  .icon-play, .icon-pause, .icon-next, .icon-prev { display: none; }
</style>

<div class="player-card">
  <div class="main-content">
    <div class="album-art" id="albumArt"></div>
    <div class="track-info">
      <div class="title" id="trackTitle">Waiting for media...</div>
      <div class="artist" id="trackArtist">--</div>
      <div class="lyrics" id="trackLyrics"></div>
      
      <div class="controls">
        <button class="btn" id="btnPrev">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="btn play-pause" id="btnPlayPause">
          <svg id="svgPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="svgPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn" id="btnNext">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
  let isPlaying = false;
  
  function updateUI(state) {
    if (state.title) $('#trackTitle').textContent = state.title;
    if (state.artist) $('#trackArtist').textContent = state.artist;
    if (state.lyrics) $('#trackLyrics').textContent = '"' + state.lyrics + '"';
    if (state.progress !== undefined) {
      $('#progressBar').style.width = state.progress + '%';
    }
    
    if (state.playing !== undefined) {
      isPlaying = (state.playing === 1);
      if (isPlaying) {
        $('#svgPlay').style.display = 'none';
        $('#svgPause').style.display = 'block';
        $('#albumArt').style.transform = 'scale(1.05)';
        $('#albumArt').style.boxShadow = '0 12px 30px rgba(78,205,196,0.5)';
      } else {
        $('#svgPlay').style.display = 'block';
        $('#svgPause').style.display = 'none';
        $('#albumArt').style.transform = 'scale(1)';
        $('#albumArt').style.boxShadow = '0 8px 24px rgba(0,0,0,0.4)';
      }
    }
  }

  function onState(state) {
    updateUI(state);
  }

  // Setup Interaction
  $('#btnPlayPause').addEventListener('click', function() {
    // Optimistic UI update
    isPlaying = !isPlaying;
    updateUI({ playing: isPlaying ? 1 : 0 });
    // Send to daemon
    widget.callDaemon({ action: isPlaying ? 'play' : 'pause' });
  });

  $('#btnNext').addEventListener('click', function() {
    widget.callDaemon({ action: 'next' });
  });

  $('#btnPrev').addEventListener('click', function() {
    widget.callDaemon({ action: 'prev' });
  });

  // Hydrate from initial state if present
  if (widget.state && widget.state.title) {
    updateUI(widget.state);
  }
</script>
