<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
  }
  .wc-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 12px 16px;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  .wc-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 12px;
    position: relative;
    min-width: 0;
  }
  .wc-zone + .wc-zone {
    border-left: 1px solid var(--canvas-border, #2a2a3e);
  }

  /* Active/local highlight */
  .wc-zone.local {
    background: color-mix(in srgb, var(--canvas-accent, #6366f1) 8%, transparent);
    border-radius: 12px;
  }
  .wc-zone.local + .wc-zone,
  .wc-zone + .wc-zone.local {
    border-left-color: transparent;
  }
  .wc-zone.local .wc-city {
    color: var(--canvas-accent, #6366f1);
  }

  /* City name */
  .wc-city {
    font-size: clamp(9px, 1.8vw, 11px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--canvas-muted, #888);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    text-align: center;
    font-variant-caps: small-caps;
  }

  /* Digital time */
  .wc-time {
    display: flex;
    align-items: baseline;
    gap: 0;
    line-height: 1;
  }
  .wc-digits {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 300;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-variant-numeric: tabular-nums;
    color: var(--canvas-text, #e0e0e0);
    letter-spacing: -1px;
  }
  .wc-colon {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 300;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    color: var(--canvas-text, #e0e0e0);
    animation: wc-blink 1s step-end infinite;
    will-change: opacity;
  }
  .wc-ampm {
    font-size: clamp(10px, 1.8vw, 12px);
    font-weight: 600;
    color: var(--canvas-muted, #888);
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Date */
  .wc-date {
    font-size: clamp(8px, 1.5vw, 10px);
    font-weight: 400;
    color: color-mix(in srgb, var(--canvas-muted, #888) 70%, transparent);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  @keyframes wc-blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.2; }
  }
</style>

<div class="wc-container" id="wcContainer"></div>

<script>

  var cfg = (typeof widget !== "undefined" && widget.config) ? widget.config : ((typeof PiWidget !== "undefined" && PiWidget.config) || (typeof config !== "undefined" ? config : {}));
  var use24h = cfg.use24h === true;
  var localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;

  var zones = [
    { tz: cfg.timezone1 || 'America/New_York', label: cfg.label1 || 'New York' },
    { tz: cfg.timezone2 || 'Europe/London', label: cfg.label2 || 'London' },
    { tz: cfg.timezone3 || 'Asia/Tokyo', label: cfg.label3 || 'Tokyo' }
  ];

  var containerNode = document.getElementById(typeof instanceId !== 'undefined' ? instanceId : 'wcContainer');
  var shadowRoot = containerNode ? (containerNode.shadowRoot || containerNode) : document;
  var container = shadowRoot.querySelector('#wcContainer');
  if (!container) return;

  var elements = [];
  for (var i = 0; i < zones.length; i++) {
    var z = zones[i];
    var div = document.createElement('div');
    div.className = 'wc-zone';
    if (z.tz === localTz) div.classList.add('local');

    var city = document.createElement('div');
    city.className = 'wc-city';
    city.textContent = z.label;

    var timeRow = document.createElement('div');
    timeRow.className = 'wc-time';

    var hh = document.createElement('span');
    hh.className = 'wc-digits';
    var colon = document.createElement('span');
    colon.className = 'wc-colon';
    colon.textContent = ':';
    var mm = document.createElement('span');
    mm.className = 'wc-digits';
    var ampm = document.createElement('span');
    ampm.className = 'wc-ampm';
    if (use24h) ampm.style.display = 'none';

    timeRow.appendChild(hh);
    timeRow.appendChild(colon);
    timeRow.appendChild(mm);
    timeRow.appendChild(ampm);

    var dateEl = document.createElement('div');
    dateEl.className = 'wc-date';

    div.appendChild(city);
    div.appendChild(timeRow);
    div.appendChild(dateEl);
    container.appendChild(div);

    elements.push({ tz: z.tz, hh: hh, mm: mm, ampm: ampm, dateEl: dateEl });
  }

  function update() {
    var now = new Date();
    for (var i = 0; i < elements.length; i++) {
      var e = elements[i];
      try {
        if (use24h) {
          var h24 = now.toLocaleString('en-US', { timeZone: e.tz, hour: '2-digit', hour12: false });
          var m24 = now.toLocaleString('en-US', { timeZone: e.tz, minute: '2-digit' });
          e.hh.textContent = h24.padStart(2, '0');
          e.mm.textContent = m24.padStart(2, '0');
        } else {
          var parts = now.toLocaleString('en-US', { timeZone: e.tz, hour: 'numeric', minute: '2-digit', hour12: true }).split(' ');
          var time = parts[0].split(':');
          e.hh.textContent = time[0];
          e.mm.textContent = time[1];
          e.ampm.textContent = parts[1] || '';
        }
        e.dateEl.textContent = now.toLocaleDateString('en-US', { timeZone: e.tz, weekday: 'short', month: 'short', day: 'numeric' });
      } catch(err) {
        e.hh.textContent = '--';
        e.mm.textContent = '--';
      }
    }
  }

  var timer = setInterval(update, 1000);
  update();

  window.onDestroy = function() {
    clearInterval(timer);
  };

</script>
