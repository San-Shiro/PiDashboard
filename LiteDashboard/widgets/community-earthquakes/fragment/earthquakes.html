<div class="widget-root" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #0f172a;">
  <div class="earthquake-container" style="position: relative; width: 100%; aspect-ratio: 2 / 1; max-height: 100%; overflow: hidden; border-radius: 8px; background: transparent;">
  <!-- Equirectangular SVG World Map Outline -->
  <div class="world-map-css" style="position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.6;"></div>
  
  <div class="markers-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
  
  <div class="quake-detail" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 10; color: white; padding: 12px; box-sizing: border-box; flex-direction: column;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; margin-bottom: 8px;">
      <h3 style="margin: 0; font-size: 1.1em; color: inherit;">Earthquake Details</h3>
      <button class="back-btn" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px; pointer-events: auto;">&times;</button>
    </div>
    <div class="detail-content" style="flex: 1; overflow-y: auto; font-size: 0.9em; line-height: 1.6;"></div>
  </div>
</div>

<style>
/* Scoped pulse animation for markers */
@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(3); opacity: 0; }
}

.dot {
  position: absolute;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.pulse-ring {
  position: absolute;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
  pointer-events: none;
}
</style>

  function applyConfig(cfg) {
    if (cfg.dotColor) dotColor = cfg.dotColor;
    if (cfg.mapColor && cfg.mapColor !== mapColor) {
      mapColor = cfg.mapColor;
      if (mapCss) mapCss.style.backgroundColor = mapColor;
    }
    if (cfg.backgroundColor && rootDiv) rootDiv.style.backgroundColor = cfg.backgroundColor;
    if (cfg.pulseSpeed) pulseSpeed = cfg.pulseSpeed;
  }
  
  // Projection formula (Equirectangular)
  function project(lng, lat) {
    const x = ((lng + 180) / 360) * 100;
    const y = ((90 - lat) / 180) * 100;
    return { x, y };
  }
  
  // Use PiDashboard Widget SDK API
  window.widget.register({
    onState: function(data) {
      // Config is injected by compositor
      const config = (window.widget && window.widget.config) ? window.widget.config : {};
      applyConfig(config);
      
      // Clear old markers
      layer.innerHTML = '';
      
      // Unwrap instance data if nested
      const safeData = data || {};
      const instanceData = safeData[window.instanceId] || safeData;
      if (!Array.isArray(instanceData)) return;
      
      instanceData.forEach(quake => {
        const pos = project(quake.lng, quake.lat);
        const size = Math.max(3, (quake.mag - 2) * 2); // Relative dot size
        
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = `${pos.x}%`;
        dot.style.top = `${pos.y}%`;
        dot.style.width = `${size}px`;
        dot.style.height = `${size}px`;
        dot.style.backgroundColor = dotColor;
        
        const ring = document.createElement('div');
        ring.className = 'pulse-ring';
        ring.style.left = `${pos.x}%`;
        ring.style.top = `${pos.y}%`;
        ring.style.width = `${size}px`;
        ring.style.height = `${size}px`;
        ring.style.border = `2px solid ${dotColor}`;
        ring.style.animationDuration = `${pulseSpeed}s`;
        
        const clickHandler = (e) => {
          e.stopPropagation();
          if (!detailView) return;
          const d = new Date(quake.time);
          detailContent.innerHTML = `
            <div><strong>Magnitude:</strong> ${quake.mag.toFixed(1)}</div>
            <div style="margin-top: 4px;"><strong>Location:</strong> ${quake.place}</div>
            <div style="margin-top: 4px;"><strong>Time:</strong> ${d.toLocaleString()}</div>
            <div style="margin-top: 4px;"><strong>Coordinates:</strong> ${quake.lat.toFixed(2)}&deg;N, ${quake.lng.toFixed(2)}&deg;E</div>
          `;
          detailView.style.display = 'flex';
        };
        
        dot.style.cursor = 'pointer';
        ring.style.cursor = 'pointer';
        
        dot.style.pointerEvents = 'auto';
        ring.style.pointerEvents = 'auto';
        
        dot.addEventListener('click', clickHandler);
        ring.addEventListener('click', clickHandler);
        
        layer.appendChild(dot);
        layer.appendChild(ring);
      });
    }
  });
})();
