<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
  }
  .sysinfo-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    color: rgba(255, 255, 255, 0.9);
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 20px;
    box-sizing: border-box;
  }
  .metric {
    margin-bottom: 15px;
  }
  .metric:last-child {
    margin-bottom: 0;
  }
  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 6px;
  }
  .label {
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.7;
  }
  .value {
    font-size: 16px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fg {
    height: 100%;
    width: 100%;
    transform: scaleX(0);
    transform-origin: left;
    border-radius: 2px;
    transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.5s ease;
    will-change: transform;
  }
  
  /* Use CSS custom properties for dynamic fallback colors */
  :host {
    --low-color: #00e5ff;
    --mid-color: #ff9100;
    --high-color: #ff1744;
  }
</style>

<div class="sysinfo-container" id="sysinfo-wrapper">
  <div class="metric" data-bind-show="config.showCpu">
    <div class="label-row">
      <span class="label">CPU Usage</span>
      <span class="value" data-bind="cpu_percent" data-format="fixed:1" data-suffix="%">--%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fg" data-bar="cpu_percent" data-bar-low="#00e5ff"></div>
    </div>
  </div>

  <div class="metric" data-bind-show="config.showRam">
    <div class="label-row">
      <span class="label">RAM Usage</span>
      <span class="value" data-bind="mem_percent" data-format="fixed:1" data-suffix="%">--%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fg" data-bar="mem_percent" data-bar-low="#b388ff"></div>
    </div>
  </div>

  <div class="metric" data-bind-show="config.showTemp">
    <div class="label-row">
      <span class="label">Temperature</span>
      <span class="value" data-bind="cpu_temp" data-format="fixed:1" data-suffix="°C">--°C</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fg" data-bar="cpu_temp" data-bar-low="#ff3d00"></div>
    </div>
  </div>

  <div class="metric" data-bind-show="config.showDisk">
    <div class="label-row">
      <span class="label">Disk Usage</span>
      <span class="value" data-bind="disk_percent" data-format="fixed:1" data-suffix="%">--%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fg" data-bar="disk_percent" data-bar-low="#00e676"></div>
    </div>
  </div>

  <div class="metric" data-bind-show="config.showUptime" style="margin-top: 10px;">
    <div class="label-row">
      <span class="label">Uptime</span>
      <span class="value" data-bind="uptime_seconds" data-format="duration" style="font-weight:400;">--</span>
    </div>
  </div>
</div>
