<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
  }
  .frame-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: 6px;
    border: 2px solid var(--canvas-border, #333);
    background: var(--canvas-surface, #1a1a2e);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.4),
      inset 0 0 0 1px rgba(255, 255, 255, 0.04);
  }
  .frame-inner {
    position: absolute;
    inset: 6px;
    border-radius: 3px;
    overflow: hidden;
    background: #0a0a14;
  }
  .photo-layer {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity;
  }
  .photo-layer.active {
    opacity: 1;
  }
  /* Subtle vignette overlay for premium feel */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 60%,
      rgba(0, 0, 0, 0.35) 100%
    );
    z-index: 2;
  }
  /* Loading state */
  .loading-state {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--canvas-muted, #666);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    opacity: 0.7;
    z-index: 1;
  }
  .loading-icon {
    width: 24px;
    height: 24px;
    border: 2px solid var(--canvas-border, #333);
    border-top-color: var(--canvas-accent, #ff6b6b);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading-state.hidden {
    display: none;
  }
  /* Corner accents */
  .corner {
    position: absolute;
    width: 12px;
    height: 12px;
    z-index: 3;
    opacity: 0.15;
  }
  .corner::before,
  .corner::after {
    content: '';
    position: absolute;
    background: var(--canvas-accent, #ff6b6b);
  }
  .corner::before {
    width: 100%;
    height: 1px;
  }
  .corner::after {
    width: 1px;
    height: 100%;
  }
  .corner.tl { top: 6px; left: 6px; }
  .corner.tr { top: 6px; right: 6px; }
  .corner.tr::before { right: 0; }
  .corner.tr::after { right: 0; }
  .corner.bl { bottom: 6px; left: 6px; }
  .corner.bl::before { bottom: 0; }
  .corner.bl::after { bottom: 0; }
  .corner.br { bottom: 6px; right: 6px; }
  .corner.br::before { right: 0; bottom: 0; }
  .corner.br::after { right: 0; bottom: 0; }
</style>

<div class="frame-container">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="frame-inner">
    <div class="loading-state" id="loadingState">
      <div class="loading-icon"></div>
      Loading…
    </div>
    <div class="photo-layer" id="layerA"></div>
    <div class="photo-layer" id="layerB"></div>
    <div class="vignette"></div>
  </div>
</div>

<script>
(function () {
  var config = (typeof PiWidget !== 'undefined' && PiWidget.config) || {};
  var imageUrl = config.imageUrl || '/media/photo.jpg';
  var interval = Math.max(3, Math.min(60, parseInt(config.interval, 10) || 10));
  var objectFit = config.objectFit || 'cover';

  var layerA = document.getElementById('layerA');
  var layerB = document.getElementById('layerB');
  var loadingState = document.getElementById('loadingState');

  // Map objectFit to background-size
  var sizeMap = { cover: 'cover', contain: 'contain', fill: '100% 100%' };
  var bgSize = sizeMap[objectFit] || 'cover';

  layerA.style.backgroundSize = bgSize;
  layerB.style.backgroundSize = bgSize;

  var currentLayer = 0; // 0 = A active, 1 = B active
  var layers = [layerA, layerB];

  function loadImage(url) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      img.onload = function () { resolve(url); };
      img.onerror = function () { reject(new Error('Failed to load: ' + url)); };
      img.src = url;
    });
  }

  function showImage(url) {
    var activeIdx = currentLayer;
    var nextIdx = 1 - currentLayer;

    // Set next layer image
    layers[nextIdx].style.backgroundImage = 'url("' + url + '")';

    // Crossfade
    layers[nextIdx].classList.add('active');
    layers[activeIdx].classList.remove('active');

    currentLayer = nextIdx;
    loadingState.classList.add('hidden');
  }

  // Initial load
  loadImage(imageUrl)
    .then(function (url) {
      showImage(url);
    })
    .catch(function () {
      loadingState.innerHTML = '<span style="opacity:0.5">⚠ Image not found</span>';
    });

  // For a single image URL, we just keep it displayed.
  // The crossfade infrastructure supports future multi-image arrays.
  // Re-check the image periodically in case it changes on disk.
  if (interval > 0) {
    setInterval(function () {
      loadImage(imageUrl + '?t=' + Date.now())
        .then(function (url) {
          showImage(url);
        })
        .catch(function () {
          // Keep current image on failure
        });
    }, interval * 1000);
  }
})();
</script>
