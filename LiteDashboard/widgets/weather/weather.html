<style>
  .weather-card {
    background: linear-gradient(135deg, rgba(14,165,233,0.18), rgba(37,99,235,0.16));
    border-radius: 18px;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 18px; box-sizing: border-box;
    font-family: 'Inter', -apple-system, sans-serif;
    position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    transition: background 1s ease;
  }
  .weather-card.sunny { background: linear-gradient(135deg, rgba(251,191,36,0.20), rgba(249,115,22,0.18)); }
  .weather-card.rainy { background: linear-gradient(135deg, rgba(71,85,105,0.22), rgba(30,41,59,0.22)); }
  .weather-card.cloudy { background: linear-gradient(135deg, rgba(148,163,184,0.18), rgba(71,85,105,0.22)); }
  .weather-card.night { background: linear-gradient(135deg, rgba(67,56,202,0.24), rgba(30,41,59,0.24)); }
  .weather-card.thunder { background: linear-gradient(135deg, rgba(120,53,15,0.24), rgba(31,41,55,0.28)); }

  .w-location {
    font-size: 11px; opacity: 0.72;
    font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .temp-display { display: flex; align-items: baseline; margin-bottom: 4px; }
  .temp {
    font-size: 54px; font-weight: 800;
    line-height: 1; text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    color: var(--canvas-text);
  }
  .unit { font-size: 22px; margin-left: 4px; opacity: 0.8; color: var(--canvas-text); }
  .condition {
    font-size: 16px; font-weight: 600;
    margin-bottom: auto;
    letter-spacing: 0.04em; color: var(--canvas-text);
  }
  .details {
    display: flex; flex-wrap: wrap;
    gap: 12px; font-size: 12px;
    opacity: 0.9; color: var(--canvas-text);
  }
  .details span { white-space: nowrap; }
  .w-icon {
    position: absolute; right: 14px; top: 10px;
    font-size: 42px; opacity: 0.92;
    transition: all 1s;
    pointer-events: none;
  }
  .weather-status {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.7;
  }
  /* Compact mode */
  .weather-card.compact { flex-direction: row; align-items: center; gap: 12px; padding: 14px; }
  .weather-card.compact .temp { font-size: 36px; }
  .weather-card.compact .unit { font-size: 18px; }
  .weather-card.compact .condition { font-size: 12px; margin-bottom: 0; }
  .weather-card.compact .w-icon { font-size: 28px; right: 14px; top: 14px; transform: none; }
  .weather-card.compact .details { font-size: 11px; gap: 10px; }
</style>

<div id="wStage" style="width:100%;height:100%;overflow:hidden;">
  <div class="weather-card" id="wCard">
    <div class="w-icon" id="wIcon">⛅</div>
    <div class="w-location" id="wLoc">--</div>
    <div class="temp-display">
      <div class="temp" id="wTemp">--</div>
      <div class="unit" id="wUnit">°</div>
    </div>
    <div class="condition" id="wCond">Loading...</div>
    <div class="details" id="wDetails">
      <span id="wHumid">💧 --%</span>
      <span id="wWind">💨 -- km/h</span>
      <span id="wFeel" style="display:none">🌡 Feels --°</span>
    </div>
    <div class="weather-status" id="wStatus"></div>
  </div>
</div>

<script>
  function onState(state) {
    if (state.temperature !== undefined) $('#wTemp').textContent = state.temperature;
    if (state.humidity !== undefined) $('#wHumid').textContent = '💧 ' + state.humidity + '%';
    if (state.wind !== undefined) $('#wWind').textContent = '💨 ' + state.wind + ' mph';
    if (state.location !== undefined) $('#wLoc').textContent = state.location;
    
    if (state.condition) {
      $('#wCond').textContent = state.condition;
      
      var c = state.condition.toLowerCase();
      var card = $('#wCard');
      var icon = $('#wIcon');
      
      card.className = 'weather-card';
      if (c.includes('sun') || c.includes('clear')) {
        card.classList.add('sunny');
        icon.textContent = '☀️';
      } else if (c.includes('rain') || c.includes('thunder')) {
        card.classList.add('rainy');
        icon.textContent = '🌧️';
      } else if (c.includes('night')) {
        card.classList.add('night');
        icon.textContent = '🌙';
      } else {
        card.classList.add('cloudy');
        icon.textContent = '☁️';
      }
    }
  }

  var initialState = (typeof widget !== 'undefined' && widget.state) || (window.PiWidget && window.PiWidget.state) || null;
  if (initialState && (initialState.temperature !== undefined || initialState.condition)) {
    onState(initialState);
  }
</script>
