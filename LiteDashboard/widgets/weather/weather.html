<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
  }
  .weather-card {
    background: linear-gradient(135deg, rgba(30,136,229,0.8), rgba(21,101,192,0.9));
    border-radius: 16px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 24px;
    box-sizing: border-box;
    color: white;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 1s ease;
  }
  
  .weather-card.sunny { background: linear-gradient(135deg, rgba(255,167,38,0.8), rgba(239,108,0,0.9)); }
  .weather-card.rainy { background: linear-gradient(135deg, rgba(84,110,122,0.8), rgba(55,71,79,0.9)); }
  .weather-card.cloudy { background: linear-gradient(135deg, rgba(144,164,174,0.8), rgba(84,110,122,0.9)); }

  .temp-display {
    display: flex;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .temp {
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    text-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  .unit {
    font-size: 32px;
    margin-left: 4px;
    opacity: 0.8;
  }
  
  .condition {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: auto;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  .details {
    display: flex;
    gap: 24px;
    font-size: 18px;
    opacity: 0.9;
  }
  
  .icon {
    position: absolute;
    right: -20px;
    top: -20px;
    font-size: 150px;
    opacity: 0.2;
    filter: blur(2px);
    transition: all 1s;
  }
</style>

<div class="weather-card" id="wCard">
  <div class="icon" id="wIcon">⛅</div>
  <div class="temp-display">
    <div class="temp" id="wTemp">--</div>
    <div class="unit">°C</div>
  </div>
  <div style="font-size: 14px; opacity: 0.7; font-weight: 600; letter-spacing: 1px; margin-bottom: 2px;">KANPUR</div>
  <div class="condition" id="wCond">Loading...</div>
  
  <div class="details">
    <div id="wHumid">💧 --%</div>
    <div id="wWind">💨 -- km/h</div>
  </div>
</div>

<script>
  function onState(state) {
    if (state.temperature !== undefined) $('#wTemp').textContent = state.temperature;
    if (state.humidity !== undefined) $('#wHumid').textContent = '💧 ' + state.humidity + '%';
    if (state.wind !== undefined) $('#wWind').textContent = '💨 ' + state.wind + ' mph';
    
    if (state.condition) {
      $('#wCond').textContent = state.condition;
      
      const c = state.condition.toLowerCase();
      const card = $('#wCard');
      const icon = $('#wIcon');
      
      card.className = 'weather-card';
      if (c.includes('sun')) {
        card.classList.add('sunny');
        icon.textContent = '☀️';
      } else if (c.includes('rain') || c.includes('thunder')) {
        card.classList.add('rainy');
        icon.textContent = '🌧️';
      } else {
        card.classList.add('cloudy');
        icon.textContent = '☁️';
      }
    }
  }

  if (widget.state && widget.state.temperature) {
    onState(widget.state);
  }
</script>
