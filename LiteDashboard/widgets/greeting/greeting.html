<style>
  :host {
    display: block;
    width: 100%;
    height: 100%;
  }
  .greeting-container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
    overflow: hidden;
  }
  .greeting-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-wrap: wrap;
    line-height: 1.15;
  }
  .greeting-text {
    color: var(--canvas-accent, #ff6b6b);
    font-size: clamp(18px, 5vw, 36px);
    font-weight: 300;
    letter-spacing: -0.5px;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }
  .greeting-emoji {
    font-size: clamp(20px, 5vw, 34px);
    opacity: 0;
    transform: scale(0.7);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
    display: inline-block;
  }
  .greeting-name {
    color: var(--canvas-text, #e0e0e0);
    font-size: clamp(18px, 5vw, 36px);
    font-weight: 300;
    letter-spacing: -0.5px;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
  }
  .date-line {
    margin-top: 6px;
    color: var(--canvas-muted, #888);
    font-size: clamp(11px, 2.5vw, 15px);
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
  }
  .date-divider {
    display: inline-block;
    width: 16px;
    height: 1px;
    background: var(--canvas-border, #444);
    vertical-align: middle;
    margin: 0 8px;
    opacity: 0.6;
  }
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes popIn {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }
</style>

<div class="greeting-container">
  <div class="greeting-line">
    <span class="greeting-text" id="greetingText"></span>
    <span class="greeting-emoji" id="greetingEmoji"></span>
    <span class="greeting-name" id="greetingName"></span>
  </div>
  <div class="date-line" id="dateLine"></div>
</div>

<script>
(function () {
  var config = (typeof PiWidget !== 'undefined' && PiWidget.config) || {};
  var name = config.name || '';
  var showDate = config.showDate !== false;

  var greetingText = document.getElementById('greetingText');
  var greetingEmoji = document.getElementById('greetingEmoji');
  var greetingName = document.getElementById('greetingName');
  var dateLine = document.getElementById('dateLine');

  var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  var months = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];

  function getGreeting(hour) {
    if (hour >= 5 && hour < 12) return { text: 'Good Morning', emoji: '☀️' };
    if (hour >= 12 && hour < 17) return { text: 'Good Afternoon', emoji: '🌤️' };
    if (hour >= 17 && hour < 21) return { text: 'Good Evening', emoji: '🌙' };
    return { text: 'Good Night', emoji: '🌛' };
  }

  function update() {
    var now = new Date();
    var g = getGreeting(now.getHours());

    var nameStr = name ? ', ' + name : '';
    greetingText.textContent = g.text + nameStr;
    greetingEmoji.textContent = g.emoji;
    greetingName.style.display = 'none'; // Name is part of greeting text now

    if (showDate) {
      var dayName = days[now.getDay()];
      var monthName = months[now.getMonth()];
      var date = now.getDate();
      dateLine.innerHTML = dayName + '<span class="date-divider"></span>' + monthName + ' ' + date;
      dateLine.style.display = '';
    } else {
      dateLine.style.display = 'none';
    }
  }

  update();

  // Refresh every 60 seconds to catch greeting period changes
  setInterval(update, 60000);
})();
</script>
